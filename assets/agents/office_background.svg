<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <!-- wall -->
  <rect x="0" y="0" width="1280" height="346" fill="#3a332b"/>
  <rect x="0" y="330" width="1280" height="16" fill="#2c2620"/>
  <!-- floor (warm wood) -->
  <rect x="0" y="346" width="1280" height="374" fill="#5c4633"/>
  <g stroke="#4a3829" stroke-width="3" opacity="0.7">
    <line x1="0" y1="410" x2="1280" y2="410"/>
    <line x1="0" y1="474" x2="1280" y2="474"/>
    <line x1="0" y1="538" x2="1280" y2="538"/>
    <line x1="0" y1="602" x2="1280" y2="602"/>
    <line x1="0" y1="666" x2="1280" y2="666"/>
  </g>
  <!-- rug (work area) -->
  <ellipse cx="640" cy="560" rx="380" ry="96" fill="#43506b" opacity="0.55"/>

  <!-- windows with daylight -->
  <g>
    <rect x="150" y="64" width="250" height="170" rx="10" fill="#5a4a38"/>
    <rect x="162" y="76" width="226" height="146" rx="6" fill="#9cc4d6"/>
    <line x1="275" y1="76" x2="275" y2="222" stroke="#5a4a38" stroke-width="8"/>
    <line x1="162" y1="149" x2="388" y2="149" stroke="#5a4a38" stroke-width="8"/>
    <rect x="880" y="64" width="250" height="170" rx="10" fill="#5a4a38"/>
    <rect x="892" y="76" width="226" height="146" rx="6" fill="#9cc4d6"/>
    <line x1="1005" y1="76" x2="1005" y2="222" stroke="#5a4a38" stroke-width="8"/>
    <line x1="892" y1="149" x2="1118" y2="149" stroke="#5a4a38" stroke-width="8"/>
  </g>
  <!-- wall clock -->
  <circle cx="640" cy="120" r="36" fill="#d8cdbd"/>
  <circle cx="640" cy="120" r="36" fill="none" stroke="#2c2620" stroke-width="4"/>
  <line x1="640" y1="120" x2="640" y2="98" stroke="#2c2620" stroke-width="4"/>
  <line x1="640" y1="120" x2="656" y2="120" stroke="#2c2620" stroke-width="4"/>

  <!-- desks with monitors -->
  <g>
    <!-- desk 1 -->
    <rect x="220" y="436" width="180" height="26" rx="6" fill="#6b513b"/>
    <rect x="232" y="462" width="12" height="48" fill="#4a3829"/>
    <rect x="376" y="462" width="12" height="48" fill="#4a3829"/>
    <rect x="286" y="392" width="52" height="40" rx="4" fill="#20232a"/>
    <rect x="291" y="397" width="42" height="30" rx="2" fill="#2f7f86"/>
    <!-- desk 2 -->
    <rect x="550" y="446" width="180" height="26" rx="6" fill="#6b513b"/>
    <rect x="562" y="472" width="12" height="48" fill="#4a3829"/>
    <rect x="706" y="472" width="12" height="48" fill="#4a3829"/>
    <rect x="616" y="402" width="52" height="40" rx="4" fill="#20232a"/>
    <rect x="621" y="407" width="42" height="30" rx="2" fill="#2f7f86"/>
    <!-- desk 3 -->
    <rect x="880" y="436" width="180" height="26" rx="6" fill="#6b513b"/>
    <rect x="892" y="462" width="12" height="48" fill="#4a3829"/>
    <rect x="1036" y="462" width="12" height="48" fill="#4a3829"/>
    <rect x="946" y="392" width="52" height="40" rx="4" fill="#20232a"/>
    <rect x="951" y="397" width="42" height="30" rx="2" fill="#2f7f86"/>
  </g>

  <!-- plants -->
  <g>
    <rect x="70" y="470" width="48" height="56" rx="8" fill="#7a5a3f"/>
    <ellipse cx="94" cy="456" rx="40" ry="44" fill="#4e7d52"/>
    <ellipse cx="78" cy="470" rx="22" ry="30" fill="#3f6845"/>
    <rect x="1162" y="470" width="48" height="56" rx="8" fill="#7a5a3f"/>
    <ellipse cx="1186" cy="456" rx="40" ry="44" fill="#4e7d52"/>
    <ellipse cx="1202" cy="470" rx="22" ry="30" fill="#3f6845"/>
  </g>
